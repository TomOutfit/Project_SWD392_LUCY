events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # ── Upstream services (internal to the container) ──────────────
    upstream dotnet_service {
        server 127.0.0.1:5001;
    }

    upstream njs_service {
        server 127.0.0.1:3001;
    }

    server {
        listen 80;
        server_name _;

        # Proxy headers forwarded to backends
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin            $http_origin;   # Required for CORS echo



        # ── .NET Service routes (/api/auth, /users, /wallet, /gifts) ──
        location /api/auth {
            proxy_pass http://dotnet_service;
        }
        location /api/users {
            proxy_pass http://dotnet_service;
        }
        location /api/wallet {
            proxy_pass http://dotnet_service;
        }
        location /api/gifts {
            proxy_pass http://dotnet_service;
        }
        location /api/xp {
            proxy_pass http://dotnet_service;
        }

        # ── NJS Service HTTP routes ────────────────────────────────────
        location /api/levels {
            proxy_pass http://njs_service;
        }
        location /api/rooms {
            proxy_pass http://njs_service;
        }
        location /api/podcasts {
            proxy_pass http://njs_service;
        }
        location /api/agora {
            proxy_pass http://njs_service;
        }
        location /uploads {
            proxy_pass http://njs_service;
        }
        location /health {
            proxy_pass http://njs_service;
        }
        location /api/latency {
            proxy_pass http://njs_service;
        }
        location /api/sessions {
            proxy_pass http://njs_service;
        }

        # ── Socket.io WebSocket (NJS) ──────────────────────────────────
        location /socket.io/ {
            proxy_pass http://njs_service;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── React SPA (static files) ───────────────────────────────────
        root /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Gzip compression for JS/CSS/HTML
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
        gzip_min_length 1024;
    }
}
